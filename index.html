<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoStore Premium</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

header{
  padding:40px 20px;
}

header h1{
  font-size:42px;
  color:#00ffcc;
  margin:0;
  letter-spacing:2px;
  text-shadow:0 0 15px #00ffcc;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  width:90%;
  max-width:420px;
  margin:auto;
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 35px rgba(0,255,200,0.3);
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  background:#00ffcc;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00ccaa;
  transform:scale(1.05);
}

#totalBox{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 15px #00ffcc;
}

#summaryBox{
  display:none;
  margin-top:15px;
  padding:15px;
  background:rgba(0,0,0,0.4);
  border-radius:15px;
  font-size:14px;
}

#qrisPopup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.qrisContent{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:320px;
  box-shadow:0 0 35px rgba(0,255,200,0.5);
}
</style>
</head>

<body>

<header>
  <h1>NEOSTORE</h1>
  <p>Top Up Fishit Premium ⚡</p>
</header>

<section class="card">
  <form id="orderForm">
    <input type="text" id="username" placeholder="Username Fishit" required>

    <select id="produk" required>
      <option value="">Pilih Item</option>
      <option value="Batu Evo - Rp500">Batu Evo - Rp500</option>
      <option value="Secret Tumbal - Rp1.000">Secret Tumbal - Rp1.000</option>
      <option value="Maja Biru - Rp3.000">Maja Biru - Rp3.000</option>
      <option value="Maja Kuning - Rp4.000">Maja Kuning - Rp4.000</option>
      <option value="Megalodon - Rp10.000">Megalodon - Rp10.000</option>
    </select>

    <input type="number" id="jumlah" placeholder="Jumlah Pembelian" min="1" value="" required>

    <select id="metode" required>
      <option value="">Metode Pembayaran</option>
      <option>DANA</option>
      <option>OVO</option>
      <option>GOPAY</option>
      <option>QRIS</option>
    </select>

    <div id="totalBox">Total: Rp0</div>
    <div id="summaryBox"></div>

    <button type="submit">ORDER SEKARANG</button>
  </form>
</section>

<!-- QRIS POPUP -->
<div id="qrisPopup">
  <div class="qrisContent">
    <h3 style="color:#00ffcc;">Scan QRIS</h3>
    <img src="img/qris.jpg" style="width:220px;border-radius:12px;">
    <br><br>
    <button onclick="lanjutWA()">Klik Saya Sudah Bayar</button>
    <br><br>
    <button onclick="tutupQR()" style="background:#444;">Tutup</button>
  </div>
</div>

<script>
let hargaMap={
"Batu Evo - Rp500":500,
"Secret Tumbal - Rp1.000":1000,
"Maja Biru - Rp3.000":3000,
"Maja Kuning - Rp4.000":4000,
"Megalodon - Rp10.000":10000
};

let produk=document.getElementById("produk");
let jumlah=document.getElementById("jumlah");
let totalBox=document.getElementById("totalBox");
let summaryBox=document.getElementById("summaryBox");
let dataOrder={};

function updateTotal(){
  let h=hargaMap[produk.value]||0;
  let j=parseInt(jumlah.value)||1;
  let total=h*j;
  totalBox.innerText="Total: Rp"+total.toLocaleString("id-ID");
}

produk.addEventListener("change",updateTotal);
jumlah.addEventListener("input",updateTotal);

document.getElementById("orderForm").addEventListener("submit",function(e){
  e.preventDefault();

  let username=document.getElementById("username").value.trim();
  let metode=document.getElementById("metode").value;
  let h=hargaMap[produk.value];
  let j=parseInt(jumlah.value);
  let total=h*j;

  if(username===""||!h||!metode){
    alert("Lengkapi semua data!");
    return;
  }

  dataOrder={username,metode,produk:produk.value,jumlah:j,total};

  summaryBox.style.display="block";
  summaryBox.innerHTML=
  `Ringkasan Order:<br>
  Username: ${username}<br>
  Produk: ${produk.value}<br>
  Jumlah: ${j}<br>
  Total: Rp${total.toLocaleString("id-ID")}<br><br>`;

  if(metode==="QRIS"){
    document.getElementById("qrisPopup").style.display="flex";
  }else{
    lanjutWA();
  }
});

function tutupQR(){
  document.getElementById("qrisPopup").style.display="none";
}

function lanjutWA(){
  let pesan=
`Halo Admin, saya mau beli:

Username: ${dataOrder.username}
Jumlah pembelian: ${dataOrder.jumlah}
Produk: ${dataOrder.produk}
Total pembayaran: Rp${dataOrder.total.toLocaleString("id-ID")}

Silahkan kirim bukti pembayaran.
Terimakasih sudah order di NEOSTORE ⚡`;

  window.open("https://wa.me/6281328941033?text="+encodeURIComponent(pesan),"_blank");
}
</script>

</body>
</html>
