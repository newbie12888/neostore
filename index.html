<script>
let dataOrder = {};
let hargaMap = {
  "Batu Evo - Rp500": 500,
  "Secret Tumbal - Rp1.000": 1000,
  "Maja Biru - Rp3.000": 3000,
  "Maja Kuning - Rp4.000": 4000,
  "Megalodon - Rp10.000": 10000
};

let produkSelect = document.getElementById("produk");
let jumlahInput = document.getElementById("jumlah");
let totalBox = document.getElementById("totalBox");

function updateTotal(){
  let produk = produkSelect.value;
  let jumlah = parseInt(jumlahInput.value) || 1;

  if(hargaMap[produk]){
    let total = hargaMap[produk] * jumlah;

    totalBox.style.transform = "scale(1.1)";
    setTimeout(()=> totalBox.style.transform = "scale(1)",150);

    totalBox.innerText = "Total: Rp" + total.toLocaleString("id-ID");
  } else {
    totalBox.innerText = "Total: Rp0";
  }
}

produkSelect.addEventListener("change", updateTotal);
jumlahInput.addEventListener("input", updateTotal);

document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  let username = document.getElementById("username").value.trim();
  let produk = produkSelect.value;
  let metode = document.getElementById("metode").value;
  let jumlah = parseInt(jumlahInput.value);

  if(username === "" || produk === "" || metode === ""){
    alert("Lengkapi semua data dulu!");
    return;
  }

  let total = hargaMap[produk] * jumlah;

  dataOrder = { username, produk, metode, jumlah, total };

  if(metode === "QRIS"){
    document.getElementById("qrisPopup").style.display = "flex";
  } else {
    kirimWA();
  }
});

function tutupQR(){
  document.getElementById("qrisPopup").style.display = "none";
}

function kirimWA(){

  let nomorAdmin = "6281328941033";

  let pesan =
`ORDER FISHIT

Username: ${dataOrder.username}
Produk: ${dataOrder.produk}
Jumlah: ${dataOrder.jumlah}
Total: Rp${dataOrder.total.toLocaleString("id-ID")}
Metode: ${dataOrder.metode}

Saya sudah melakukan pembayaran.

NeoStore ⚡`;

  let url = "https://wa.me/" + nomorAdmin + "?text=" + encodeURIComponent(pesan);

  window.open(url, "_blank");
}
</script>
